<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>D3 Task Graph</title>
  <script src="./d3.v7.min.js"></script>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      background: transparent;
    }
    #graph { width: 100vw; height: 100vh; }

    /* Elegant Colors for Typography */
    .node-text { font-family: -apple-system, sans-serif; pointer-events: none; }
    .node-badge { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; pointer-events: none; }

    /* Legend */
    #legend {
      position: absolute; bottom: 8px; left: 8px; z-index: 10;
      background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 8px 12px; font-size: 10px; color: #f8fafc;
      backdrop-filter: blur(8px); display: flex; flex-direction: column; gap: 4px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-box { width: 10px; height: 10px; border-radius: 2px; }
    .legend-line { width: 12px; height: 2px; }

    /* Detail Popover */
    #detail {
      position: absolute; top: 8px; right: 8px; z-index: 10;
      background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 14px; font-size: 11px; max-width: 280px; min-width: 220px; color: #f8fafc;
      backdrop-filter: blur(12px); display: none; box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    #detail h3 { font-size: 13px; margin-top: 0; margin-bottom: 8px; word-break: break-word; font-weight: 600; line-height: 1.3; padding-right: 20px; }
    #detail .f { margin-bottom: 4px; display: flex; justify-content: space-between; align-items: baseline; }
    #detail .fl { color: #94a3b8; font-size: 8px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; }
    #detail .fv { font-weight: 500; font-size: 11px; text-align: right; }
    .sb { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Action Buttons inside detail pane */
    .actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
    .btn { flex: 1; padding: 6px 0; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-edit { background: #3b82f6; color: white; }
    .btn-edit:hover { background: #2563eb; }
    .btn-complete { background: #10b981; color: white; }
    .btn-complete:hover { background: #059669; }

    /* Danger Pulse */
    @keyframes danger-pulse {
      0% { stroke-width: 2px; stroke-opacity: 0.8; }
      50% { stroke-width: 8px; stroke-opacity: 0.1; }
      100% { stroke-width: 2px; stroke-opacity: 0.8; }
    }
    .danger-pulse { animation: danger-pulse 1.5s infinite ease-in-out; }

    /* Recency Highlight — warm amber glow for tasks modified in the last 7 days */
    @keyframes recent-glow {
      0% { filter: drop-shadow(0 0 2px #f59e0b); }
      50% { filter: drop-shadow(0 0 8px #fb923c); }
      100% { filter: drop-shadow(0 0 2px #f59e0b); }
    }
    .recent-node { animation: recent-glow 2s infinite ease-in-out; }

    /* Legend toggle */
    #legend-toggle {
        position: absolute; bottom: 8px; right: 8px; z-index: 10;
        background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
        padding: 4px 10px; font-size: 10px; cursor: pointer; color: #f8fafc; font-weight: 500;
    }

    /* Focus mode back button */
    #focus-back {
        display: none; position: absolute; top: 8px; left: 8px; z-index: 11;
        align-items: center; gap: 10px;
    }
    #focus-back button {
        background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; padding: 6px 12px; font-size: 11px; cursor: pointer;
        color: #f8fafc; font-weight: 600; backdrop-filter: blur(8px);
    }
    #focus-back button:hover { background: rgba(30, 40, 70, 0.95); }
    #focus-label {
        background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #94a3b8;
        max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        backdrop-filter: blur(8px);
    }
    .btn-focus { background: #7c3aed; color: white; }
    .btn-focus:hover { background: #6d28d9; }

    /* Critical path overlay on selected node's dependency chain */
    @keyframes chain-pulse {
      0%   { stroke-opacity: 0.9; stroke-width: 4px; }
      50%  { stroke-opacity: 0.5; stroke-width: 6px; }
      100% { stroke-opacity: 0.9; stroke-width: 4px; }
    }
    .chain-upstream { animation: chain-pulse 1.8s infinite ease-in-out; stroke: #f97316; }
    .chain-downstream { animation: chain-pulse 1.8s infinite ease-in-out; stroke: #a78bfa; }
    .chain-path { pointer-events: none; fill: none; }

    /* Spotlight "Start Here" ring for top-priority nodes */
    @keyframes spotlight-pulse {
      0%   { stroke-opacity: 0.95; stroke-width: 3px; }
      50%  { stroke-opacity: 0.35; stroke-width: 6px; }
      100% { stroke-opacity: 0.95; stroke-width: 3px; }
    }
    .spotlight-ring { animation: spotlight-pulse 2.2s infinite ease-in-out; }
    .hull-path { pointer-events: none; }
    .hull-label { pointer-events: none; user-select: none; }
  </style>
</head>
<body>

  <div id="graph" style="position:relative;"></div>

  <div id="focus-back">
    <button onclick="exitFocusMode()">← Full view</button>
    <span id="focus-label"></span>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-box" style="background:#3b82f6"></div><span>Active</span></div>
    <div class="legend-item"><div class="legend-box" style="background:#ef4444"></div><span>Blocked</span></div>
    <div class="legend-item"><div class="legend-box" style="background:#22c55e"></div><span>Done</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#3b82f6"></div><span>Parent</span></div>
    <div class="legend-item"><div class="legend-line" style="background:#ef4444"></div><span>Dependency</span></div>
    <div class="legend-item"><div class="legend-box" style="border: 1px solid #f59e0b; box-shadow: 0 0 4px #f59e0b"></div><span>Recent (7d)</span></div>
  </div>

  <button id="legend-toggle" onclick="toggleDetail()">Hide Details</button>

  <div id="detail">
    <div id="detail-content">
        <h3 id="dt"></h3>
        <div id="df"></div>
        <div class="actions">
            <button class="btn btn-focus" id="btn-focus" onclick="triggerFocus()">Focus</button>
            <button class="btn btn-edit" id="btn-edit" onclick="triggerAction('edit')">Edit</button>
            <button class="btn btn-complete" id="btn-complete" onclick="triggerAction('complete')">Done</button>
        </div>
    </div>
  </div>

  <script>
    let graphData = null;
    let W = window.innerWidth;
    let H = window.innerHeight;
    let currentFocusProject = "ALL";
    let currentLayout = "force";
    let activeNodeId = null;
    let focusNodeId = null;       // non-null = ego network focus mode
    let focusNeighborSet = null;  // Set of visible node IDs in focus mode
    let simulation = null;
    let svg, container, zoom, linkEls, nodeEls, hullLayer, critPathLayer;
    let _tickCount = 0;  // for throttling expensive per-tick operations

    // --- Ego network helpers ---

    // Returns Set of node IDs within `hops` hops of nodeId
    function getNeighbors(nodeId, hops) {
        const result = new Set([nodeId]);
        let frontier = new Set([nodeId]);
        for (let h = 0; h < hops; h++) {
            const next = new Set();
            graphData.links.forEach(l => {
                const sid = (typeof l.source === "object") ? l.source.id : l.source;
                const tid = (typeof l.target === "object") ? l.target.id : l.target;
                if (frontier.has(sid) && !result.has(tid)) { next.add(tid); result.add(tid); }
                if (frontier.has(tid) && !result.has(sid)) { next.add(sid); result.add(sid); }
            });
            frontier = next;
            if (frontier.size === 0) break;
        }
        return result;
    }

    function enterFocusMode(nodeId) {
        focusNodeId = nodeId;
        focusNeighborSet = getNeighbors(nodeId, 2);
        const focusNode = graphData.nodes.find(n => n.id === nodeId);
        const label = focusNode ? focusNode.label : nodeId;
        document.getElementById("focus-label").textContent = label;
        document.getElementById("focus-back").style.display = "flex";
        document.getElementById("detail").style.display = "none";
        activeNodeId = null;
        updateVisibility();
        // Auto-zoom to fit visible nodes
        const visibleNodes = graphData.nodes.filter(n => focusNeighborSet.has(n.id) && n.x != null && n.x > -9000);
        if (visibleNodes.length > 0) autoZoomToFit(visibleNodes, 150);
    }

    function exitFocusMode() {
        focusNodeId = null;
        focusNeighborSet = null;
        activeNodeId = null;
        document.getElementById("focus-back").style.display = "none";
        document.getElementById("detail").style.display = "none";
        clearCriticalPath();
        updateVisibility();
        autoZoomToFit(graphData.nodes.filter(n => n.x != null && n.x > -9000), 0);
    }

    function triggerFocus() {
        if (activeNodeId) enterFocusMode(activeNodeId);
    }

    // Status colors
    const sbc = {
      active: "background:#dbeafe;color:#1e40af",
      done: "background:#dcfce7;color:#166534",
      completed: "background:#dcfce7;color:#166534",
      blocked: "background:#fee2e2;color:#991b1b",
      waiting: "background:#fef9c3;color:#854d0e",
      review: "background:#f3e8ff;color:#6b21a8",
      inbox: "background:#f1f5f9;color:#475569"
    };

    // Type-based colors for simplified layout modes (treemap, circle_pack, arc).
    // Canonical node type list lives in lib/overwhelm/task_graph_d3.py (TYPE_CHARGE, TYPE_SHAPE, TYPE_BADGE).
    // When adding new node types there, add a matching entry here to keep rendering consistent.
    const TYPE_COLORS = {
      goal: '#e94560', project: '#0f3460', epic: '#e9a045',
      task: '#45e980', action: '#45c9e9', bug: '#e94545',
      note: '#888', knowledge: '#a0a0e0', learn: '#e0e0a0',
      feature: '#59a14f', person: '#9c755f', context: '#708090',
      template: '#a0a0a0', daily: '#607080', memory: '#c9a0e0',
    };

    // Helper: status-based opacity for precomputed layouts
    function statusOpacity(d) {
        if (d.status === "done" || d.status === "completed" || d.status === "cancelled") return 0.4;
        if (d.status === "active") return 0.8;
        return 0.6;
    }

    // Helper: does this layout use a force simulation?
    function isForceLayout(layout) {
        return layout === "force";
    }

    // --- Layout-specific node shape builders ---
    function buildTaskCardNode(g, d) {
        const hw = d.w/2, hh = d.h/2;
        // Spotlight ring: top-priority leaf tasks get a pulsing gold ring + label
        // Only shown on leaf tasks (isLeaf) — never on structural parent nodes
        if (d.spotlight && d.isLeaf) {
            const pad = 9;
            const rx = d.shape === "pill" ? hh + pad : d.shape === "rounded" ? 14 : 8;
            g.insert("rect", ":first-child")
              .attr("x", -hw - pad).attr("y", -hh - pad)
              .attr("width", (hw + pad) * 2).attr("height", (hh + pad) * 2)
              .attr("rx", rx).attr("fill", "none")
              .attr("stroke", "#f59e0b").attr("class", "spotlight-ring");
            g.append("text")
              .attr("x", 0).attr("y", -hh - pad - 5)
              .attr("text-anchor", "middle").attr("font-size", "8px")
              .attr("font-weight", "700").attr("fill", "#f59e0b")
              .attr("letter-spacing", "0.6px").attr("pointer-events", "none")
              .text("★ START HERE");
        }
        if (d.shape === "pill") {
            g.append("rect").attr("x",-hw).attr("y",-hh).attr("width",d.w).attr("height",d.h)
              .attr("rx",hh).attr("ry",hh)
              .attr("fill",d.fill).attr("stroke",d.borderColor).attr("stroke-width",d.borderWidth);
        } else if (d.shape === "hexagon") {
            const c = Math.min(hh * 0.6, 12);
            const pts = `${-hw+c},${-hh} ${hw-c},${-hh} ${hw},${0} ${hw-c},${hh} ${-hw+c},${hh} ${-hw},${0}`;
            g.append("polygon").attr("points", pts)
              .attr("fill",d.fill).attr("stroke",d.borderColor).attr("stroke-width",d.borderWidth);
        } else {
            g.append("rect").attr("x",-hw).attr("y",-hh).attr("width",d.w).attr("height",d.h)
              .attr("rx", d.shape === "rounded" ? 10 : 4)
              .attr("fill",d.fill).attr("stroke",d.borderColor).attr("stroke-width",d.borderWidth);
        }
        if (d.status === "blocked" && d.dw >= 2) {
            g.insert("rect",":first-child").attr("x",-hw-4).attr("y",-hh-4).attr("width",d.w+8).attr("height",d.h+8)
              .attr("rx",hh+4).attr("ry",hh+4).attr("fill","none").attr("stroke","#ef4444")
              .attr("class","danger-pulse");
        }
        const lh = d.fontSize + 4;
        const ty = -(d.lines.length * lh)/2 + d.fontSize * 0.38 + (d.badge ? 6 : 0);
        d.lines.forEach((line, i) => {
            g.append("text").attr("class","node-text").attr("x",0).attr("y", ty + i * lh)
              .attr("text-anchor","middle").attr("dominant-baseline","central")
              .attr("font-size", d.fontSize + "px")
              .attr("fill", d.textColor).text(line);
        });
        if (d.dw > 0) {
            const tw = d.dw.toFixed(1).length * 6 + 16;
            g.append("rect").attr("x",-tw/2).attr("y",hh+4).attr("width",tw).attr("height",15).attr("rx",7).attr("fill",d.borderColor).attr("opacity",0.15);
            g.append("text").attr("class","node-badge").attr("x",0).attr("y",hh+14.5).attr("text-anchor","middle").attr("font-size","8px").attr("fill",d.borderColor).text("\u2696 "+d.dw.toFixed(1));
        }
    }

    function buildTreemapNode(g, d) {
        const w = d._lw || d.w;
        const h = d._lh || d.h;
        const opacity = statusOpacity(d);
        g.append("rect")
          .attr("x", -w/2).attr("y", -h/2).attr("width", w).attr("height", h)
          .attr("fill", d.fill).attr("fill-opacity", opacity)
          .attr("stroke", d.borderColor).attr("stroke-width", 1.5);
        if (w > 40 && h > 20) {
            const label = (d.label || '').substring(0, 25);
            const fs = Math.max(6, Math.min(11, Math.min(w, h) * 0.25));
            g.append("text").attr("class","node-text").attr("x",0).attr("y",0)
              .attr("text-anchor","middle").attr("dominant-baseline","central")
              .attr("font-size", fs + "px").attr("fill", d.textColor || "#fff").text(label);
        }
    }

    function buildCirclePackNode(g, d) {
        const r = Math.max(d._lr || 5, 2);
        const opacity = statusOpacity(d);
        g.append("circle").attr("cx",0).attr("cy",0).attr("r", r)
          .attr("fill", d.fill).attr("fill-opacity", opacity)
          .attr("stroke", d.borderColor).attr("stroke-width", 1);
        if (d.status === "blocked" && d.dw >= 2) {
            g.insert("circle",":first-child").attr("cx",0).attr("cy",0).attr("r", r + 4)
              .attr("fill","none").attr("stroke","#ef4444")
              .attr("class","danger-pulse");
        }
        if (r > 15) {
            const label = (d.label || '').substring(0, 18);
            const fs = Math.max(6, Math.min(10, r * 0.35));
            g.append("text").attr("class","node-text").attr("x",0).attr("y",0)
              .attr("text-anchor","middle").attr("dominant-baseline","central")
              .attr("font-size", fs + "px").attr("fill", d.textColor || "#fff").text(label);
        }
    }

    function buildArcNode(g, d) {
        const r = Math.max(4, (d.dw || 1) * 0.5 + 3);
        const opacity = statusOpacity(d);
        g.append("circle").attr("cx",0).attr("cy",0).attr("r", r)
          .attr("fill", d.fill).attr("fill-opacity", opacity)
          .attr("stroke", d.borderColor).attr("stroke-width", 1);
    }

    // Dispatch table: maps layout mode to node builder. Add new layouts here.
    const nodeBuilders = {
        treemap: buildTreemapNode,
        tree: buildTreemapNode,
        circle_pack: buildCirclePackNode,
        circle: buildCirclePackNode,
        arc: buildArcNode,
    };

    function buildNodeShapes(layoutMode) {
        if (!nodeEls) return;
        nodeEls.each(function(d) {
            const g = d3.select(this);
            g.selectAll("*").remove();

            let builder = buildTaskCardNode;
            // Sort keys by length descending to match more specific prefixes first (e.g. 'circle_pack' before 'circle').
            const sortedNodeKeys = Object.keys(nodeBuilders).sort((a, b) => b.length - a.length);
            for (const key of sortedNodeKeys) {
                if (layoutMode.startsWith(key)) { builder = nodeBuilders[key]; break; }
            }

            builder(g, d);
        });
    }

    // --- Project convex hull helpers ---

    function projectColor(projectId) {
        let hash = 0;
        for (let i = 0; i < projectId.length; i++) {
            hash = ((hash << 5) - hash) + projectId.charCodeAt(i);
            hash |= 0;
        }
        const hue = Math.abs(hash) % 360;
        return `hsl(${hue}, 55%, 52%)`;
    }

    function updateHulls() {
        if (!hullLayer) return;
        // Only show hulls in force/precomputed/atlas layouts
        const isContainment = currentLayout.startsWith("tree") ||
                              currentLayout.startsWith("circle") ||
                              currentLayout.startsWith("arc");
        // Hide hulls in focus mode or containment layouts
        if (isContainment || focusNodeId) {
            hullLayer.selectAll("*").remove();
            return;
        }

        const projectNodes = new Map();
        graphData.nodes.forEach(n => {
            if (n.x == null || n.x < -9000) return;
            const p = n.project;
            if (!p) return;
            if (!projectNodes.has(p)) projectNodes.set(p, []);
            projectNodes.get(p).push([n.x, n.y]);
        });

        const hullData = [];
        projectNodes.forEach((pts, pid) => {
            if (pts.length < 3) return;
            const hull = d3.polygonHull(pts);
            if (!hull) return;
            // Expand hull outward from centroid by 40px so it wraps around nodes
            const cx = d3.mean(hull, p => p[0]);
            const cy = d3.mean(hull, p => p[1]);
            const expanded = hull.map(([x, y]) => {
                const dx = x - cx, dy = y - cy;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                return [x + dx / dist * 40, y + dy / dist * 40];
            });
            hullData.push({ id: pid, points: expanded, cx, cy });
        });

        hullLayer.selectAll(".hull-path").data(hullData, d => d.id)
            .join("path")
            .attr("class", "hull-path")
            .attr("d", d => "M" + d.points.map(p => p.join(",")).join("L") + "Z")
            .attr("fill", d => projectColor(d.id))
            .attr("fill-opacity", 0.05)
            .attr("stroke", d => projectColor(d.id))
            .attr("stroke-opacity", 0.22)
            .attr("stroke-width", 1.5)
            .attr("stroke-dasharray", "5,3");

        hullLayer.selectAll(".hull-label").data(hullData, d => d.id)
            .join("text")
            .attr("class", "hull-label")
            .attr("x", d => d3.mean(d.points, p => p[0]))
            .attr("y", d => d3.min(d.points, p => p[1]) - 5)
            .attr("text-anchor", "middle")
            .attr("font-size", "9px")
            .attr("font-weight", "700")
            .attr("fill", d => projectColor(d.id))
            .attr("opacity", 0.55)
            .attr("letter-spacing", "0.5px")
            .text(d => d.id.replace(/_/g, " ").toUpperCase().substring(0, 22));
    }

    // --- Critical path helpers ---

    // Returns {upstream: Set<edgeIndex>, downstream: Set<edgeIndex>}
    // upstream  = depends_on edges on paths LEADING TO nodeId (blockers)
    // downstream = depends_on edges on paths FROM nodeId (what it enables)
    function getChainEdges(nodeId) {
        const links = graphData.links;

        // BFS walk along depends_on edges.
        // direction="up"   → walk edge backwards (find tid in frontier, collect sid)
        // direction="down" → walk edge forwards  (find sid in frontier, collect tid)
        function bfsDepends(startId, direction) {
            const edgeSet = new Set();
            let frontier = new Set([startId]);
            const visited = new Set([startId]);
            while (frontier.size > 0) {
                const next = new Set();
                links.forEach((l, i) => {
                    if (l.type !== "depends_on") return;
                    const sid = (typeof l.source === "object") ? l.source.id : l.source;
                    const tid = (typeof l.target === "object") ? l.target.id : l.target;
                    const inFrontier = direction === "up" ? frontier.has(tid) : frontier.has(sid);
                    const neighbor   = direction === "up" ? sid : tid;
                    if (inFrontier && !visited.has(neighbor)) {
                        edgeSet.add(i);
                        next.add(neighbor);
                        visited.add(neighbor);
                    }
                });
                frontier = next;
            }
            return edgeSet;
        }

        return {
            upstream:   bfsDepends(nodeId, "up"),
            downstream: bfsDepends(nodeId, "down"),
        };
    }

    function updateCriticalPath(nodeId) {
        if (!critPathLayer) return;
        critPathLayer.selectAll("*").remove();
        if (!nodeId) return;

        const {upstream, downstream} = getChainEdges(nodeId);
        if (upstream.size === 0 && downstream.size === 0) return;

        const allChainLinks = graphData.links.filter((l, i) => upstream.has(i) || downstream.has(i));
        const isContainment = currentLayout.startsWith("tree") ||
                              currentLayout.startsWith("circle") ||
                              currentLayout.startsWith("arc");
        if (isContainment) return;

        critPathLayer.selectAll(".chain-path")
            .data(allChainLinks)
            .join("path")
            .attr("class", (l, i) => {
                const idx = graphData.links.indexOf(l);
                return `chain-path ${upstream.has(idx) ? "chain-upstream" : "chain-downstream"}`;
            })
            .attr("d", l => {
                const sx = l.source.x, sy = l.source.y;
                const tx = l.target.x, ty = l.target.y;
                const mx = (sx + tx) / 2;
                return `M${sx},${sy} L${mx},${sy} L${mx},${ty} L${tx},${ty}`;
            });
    }

    function clearCriticalPath() {
        if (critPathLayer) critPathLayer.selectAll("*").remove();
    }

    // Outer-scope zoom-to-fit (also used by enterFocusMode / exitFocusMode)
    // When trimOutliers=true (default for initial layout fit), compute bounding box from
    // the 5th–95th percentile of node positions so distant outliers don't force the whole
    // graph to zoom out to an unreadable scale.
    function autoZoomToFit(ns, delay, trimOutliers) {
        if (!ns || ns.length === 0) return;
        function doZoom() {
            let fitNodes = ns;
            if (trimOutliers !== false && ns.length > 8) {
                const xs = ns.map(n => n.x).slice().sort((a, b) => a - b);
                const ys = ns.map(n => n.y).slice().sort((a, b) => a - b);
                const p5x = xs[Math.floor(xs.length * 0.05)];
                const p95x = xs[Math.ceil(xs.length * 0.95) - 1];
                const p5y = ys[Math.floor(ys.length * 0.05)];
                const p95y = ys[Math.ceil(ys.length * 0.95) - 1];
                const core = ns.filter(n => n.x >= p5x && n.x <= p95x && n.y >= p5y && n.y <= p95y);
                if (core.length >= 4) fitNodes = core;
            }
            const xs = fitNodes.map(n => n.x);
            const ys = fitNodes.map(n => n.y);
            const x0 = Math.min(...xs) - 80, x1 = Math.max(...xs) + 80;
            const y0 = Math.min(...ys) - 80, y1 = Math.max(...ys) + 80;
            const dx = x1 - x0, dy = y1 - y0;
            if (dx === 0 || dy === 0) return;
            const zoomScale = Math.min(W / dx, H / dy) * 0.88;
            const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
            svg.transition().duration(450).call(
                zoom.transform,
                d3.zoomIdentity.translate(W / 2, H / 2).scale(zoomScale).translate(-cx, -cy)
            );
        }
        if (delay) { setTimeout(doZoom, delay); } else { doZoom(); }
    }

    function triggerAction(actionName) {
        if (!activeNodeId) return;
        Streamlit.setComponentValue({
            action: actionName,
            id: activeNodeId
        });
    }

    function toggleDetail() {
        const d = document.getElementById("detail");
        const b = document.getElementById("legend-toggle");
        if (d.style.display === "none") {
            d.style.display = "block";
            b.textContent = "Hide Details";
        } else {
            d.style.display = "none";
            b.textContent = "Show Details";
        }
    }

    const Streamlit = {
        setComponentReady: function() {
            window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1}, "*");
        },
        setFrameHeight: function(height) {
            window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: height}, "*");
        },
        setComponentValue: function(value) {
            window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value}, "*");
        }
    };

    window.addEventListener("message", function(event) {
        if (event.data && event.data.type === "streamlit:render") {
            onRender(event.data);
        }
    });

    // Main render function called by Streamlit
    function onRender(data) {
        const args = data.args;
        if (!window.rendered) {
            Streamlit.setFrameHeight(args.height || window.innerHeight);
            window.rendered = true;
        }

        if (!args.data || !args.data.nodes || args.data.nodes.length === 0) {
            return;
        }

        const newProject = args.project_filter || "ALL";
        const newLayout = args.layout_mode || "force";

        if (!graphData) {
            graphData = args.data;
            currentFocusProject = newProject;
            currentLayout = newLayout;
            initGraph();
        } else {
            let needLayout = (newLayout !== currentLayout);
            let needProject = (newProject !== currentFocusProject);
            currentLayout = newLayout;
            currentFocusProject = newProject;
            if (needLayout) applyLayout();
            else if (needProject) updateVisibility();
        }
    }

    function initGraph() {
        const nodes = graphData.nodes;
        const links = graphData.links;

        W = document.body.clientWidth || window.innerWidth;
        H = window.innerHeight;

        d3.select("#graph").selectAll("*").remove();

        svg = d3.select("#graph").append("svg").attr("viewBox", [0, 0, W, H]);
        const defs = svg.append("defs");

        [["ap","#3b82f6"],["ad","#ef4444"],["ar","#94a3b8"]].forEach(([id,c]) => {
          defs.append("marker").attr("id",id).attr("viewBox","0 -4 8 8")
            .attr("refX",12).attr("refY",0).attr("markerWidth",4).attr("markerHeight",4).attr("orient","auto")
            .append("path").attr("d","M0,-3L8,0L0,3").attr("fill",c);
        });
        const mMap = { parent:"ap", depends_on:"ad", ref:"ar" };

        container = svg.append("g");
        zoom = d3.zoom().scaleExtent([0.02, 10]).on("zoom", e => container.attr("transform", e.transform));
        svg.call(zoom);

        // Hull layer for project cluster backgrounds (inserted before edges and nodes)
        hullLayer = container.append("g").attr("class", "hull-layer");

        // === Build data structures ===
        const nodeById = new Map();
        nodes.forEach(n => nodeById.set(n.id, n));

        const childMap = new Map();
        nodes.forEach(n => {
          if (n.parent && nodeById.has(n.parent)) {
            if (!childMap.has(n.parent)) childMap.set(n.parent, []);
            childMap.get(n.parent).push(n);
          }
        });

        // Resolve link source/target
        links.forEach(l => {
          if (typeof l.source === "string") l.source = nodeById.get(l.source) || l.source;
          if (typeof l.target === "string") l.target = nodeById.get(l.target) || l.target;
        });

        // Store original coords for safe re-entry when switching layouts
        nodes.forEach(n => {
          if (n.x != null) { n._origX = n.x; n._origY = n.y; }
        });

        // Edges
        linkEls = container.append("g")
          .selectAll("path").data(links).join("path")
          .attr("fill","none").attr("stroke", d => d.color).attr("stroke-width", d => d.width)
          .attr("stroke-dasharray", d => d.dash || null)
          .attr("marker-end", d => `url(#${mMap[d.type]||"ar"})`)
          .attr("opacity", d => d.type === "ref" ? 0.4 : 0.7)
          .attr("stroke-linecap","round").attr("stroke-linejoin","round");

        // Nodes
        // Critical path overlay — above edges, below nodes
        critPathLayer = container.append("g").attr("class", "crit-path-layer");

        const now = Date.now() / 1000;
        const cutoff7d = 7 * 24 * 3600;

        nodeEls = container.append("g")
          .selectAll("g").data(nodes).join("g")
          .attr("class", d => {
              let cls = "node-g";
              if (d.modified && (now - d.modified) < cutoff7d) cls += " recent-node";
              return cls;
          })
          .attr("cursor","pointer")
          .on("click", (e, d) => selectNode(e, d))
          .call(d3.drag()
            .on("start", (e, d) => {
                if (isForceLayout(currentLayout) && simulation) {
                    simulation.alphaTarget(0.1).restart();
                }
                d.fx = d.x; d.fy = d.y;
            })
            .on("drag", (e, d) => {
                d.fx = e.x; d.fy = e.y;
                if (!isForceLayout(currentLayout)) {
                    d.x = e.x; d.y = e.y;
                    ticked();
                }
            })
            .on("end", (e, d) => {
                if (isForceLayout(currentLayout) && simulation) {
                    simulation.alphaTarget(0);
                }
                d.fx = null; d.fy = null;
            })
          );

        // Node shapes are built by buildNodeShapes() called from applyLayout()

        applyLayout();

        svg.on("click",()=> {
            if (focusNodeId) {
                // Click background in focus mode: exit focus, restore full view
                exitFocusMode();
            } else {
                document.getElementById("detail").style.display="none";
                activeNodeId = null;
                clearCriticalPath();
                updateVisibility();
            }
        });
    }

    // Edge routers: one function per layout strategy
    function routeContainmentEdges() {
        // Containment layouts: hide edges entirely
        linkEls.attr("d", null).attr("opacity", 0);
    }

    function routeArcEdges() {
        // Arc diagram: quadratic Bezier arcs connecting depth-stratified nodes.
        // Within the same row (same depth) arcs curve upward above the row.
        // Cross-row arcs (parent→child spanning depths) are drawn as S-curves.
        linkEls.attr("opacity", d => d.type === "ref" ? 0.15 : 0.5);
        linkEls.attr("d", d => {
            const sx = d.source.x, sy = d.source.y;
            const tx = d.target.x, ty = d.target.y;
            const dx = tx - sx, dy = ty - sy;
            if (Math.abs(dy) < 5) {
                // Same row: arc above the baseline
                const heightScale = d.type === "parent" ? 0.45 : d.type === "depends_on" ? 0.35 : 0.2;
                const arcH = Math.abs(dx) * heightScale;
                const midX = (sx + tx) / 2;
                return `M${sx},${sy} Q${midX},${sy - arcH} ${tx},${ty}`;
            } else {
                // Cross-row (parent/dependency): cubic S-curve between rows
                const my = (sy + ty) / 2;
                return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
            }
        });
    }

    function routeForceEdges() {
        // Force / precomputed / atlas: full edge routing
        linkEls.attr("opacity", d => d.type === "ref" ? 0.4 : 0.7);
        linkEls.attr("d", d => {
            const sx = d.source.x, sy = d.source.y;
            const tx = d.target.x, ty = d.target.y;
            if (d.type === "depends_on") {
                const mx = (sx + tx) / 2;
                return `M${sx},${sy} L${mx},${sy} L${mx},${ty} L${tx},${ty}`;
            }
            if (d.type === "parent") {
                const my = (sy + ty) / 2;
                return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
            }
            return `M${sx},${sy} L${tx},${ty}`;
        });
    }

    function routeSfdpEdges() {
        // SFDP layout: all edges use Manhattan (orthogonal) routing
        // Override stroke-linejoin to miter for sharp 90-degree corners
        linkEls.attr("opacity", d => d.type === "ref" ? 0.25 : 0.6)
            .attr("stroke-linejoin", "miter")
            .attr("stroke-linecap", "square");
        linkEls.attr("d", d => {
            const sx = d.source.x, sy = d.source.y;
            const tx = d.target.x, ty = d.target.y;
            if (sx == null || sy == null || tx == null || ty == null) return null;
            const mx = (sx + tx) / 2;
            return `M${sx},${sy} L${mx},${sy} L${mx},${ty} L${tx},${ty}`;
        });
    }

    // Dispatch table: maps layout mode to edge router
    const edgeRouters = {
        treemap: routeContainmentEdges,
        tree: routeContainmentEdges,
        circle_pack: routeContainmentEdges,
        circle: routeContainmentEdges,
        arc: routeArcEdges,
        sfdp: routeSfdpEdges,
    };

    // Layout-aware tick handler: delegates to per-layout edge router
    function ticked() {
        _tickCount++;
        let router = routeForceEdges;
        // Sort keys by length descending to match more specific prefixes first.
        const sortedRouterKeys = Object.keys(edgeRouters).sort((a, b) => b.length - a.length);
        for (const key of sortedRouterKeys) {
            if (currentLayout.startsWith(key)) { router = edgeRouters[key]; break; }
        }

        router();
        nodeEls.attr("transform", d => `translate(${d.x},${d.y})`);
        // Update critical path overlay positions each tick (needed for force simulation)
        if (activeNodeId && critPathLayer && critPathLayer.selectAll(".chain-path").size() > 0) {
            critPathLayer.selectAll(".chain-path").attr("d", l => {
                const sx = l.source.x, sy = l.source.y;
                const tx = l.target.x, ty = l.target.y;
                const mx = (sx + tx) / 2;
                return `M${sx},${sy} L${mx},${sy} L${mx},${ty} L${tx},${ty}`;
            });
        }
        // Throttle hull updates — convex hull computation is O(n log n) per project;
        // update every 4 ticks during simulation, always on final tick.
        if (_tickCount % 4 === 0 || (simulation && simulation.alpha() < 0.01)) {
            updateHulls();
        }
    }

    function applyLayout() {
        if (simulation) simulation.stop();
        _tickCount = 0;

        const nodes = graphData.nodes;
        const links = graphData.links;

        // All tunables from Python FORCE_CONFIG via graphData.forceConfig
        const fc = graphData.forceConfig || {};

        // IMPORTANT: Every layout branch below MUST call buildNodeShapes(currentLayout)
        // after setting any layout-specific dimensions (n._lw, n._lh, n._lr) on nodes,
        // so that node shapes are rebuilt with the correct geometry for the new layout.

        // Compute per-node link count for degree-aware forces (orphan detection, atlas gravity)
        nodes.forEach(n => { n.linkCount = 0; });
        links.forEach(l => {
            if (l.source && l.target) {
                const s = (typeof l.source === "object") ? l.source : null;
                const t = (typeof l.target === "object") ? l.target : null;
                if (s) s.linkCount = (s.linkCount || 0) + 1;
                if (t) t.linkCount = (t.linkCount || 0) + 1;
            }
        });

        // Custom clustering force: pull same-project nodes toward their centroid
        function forceCluster(clusterStrength) {
            let _nodes;
            function force(alpha) {
                const clusters = new Map();
                _nodes.forEach(n => {
                    const p = n.project || "__none__";
                    if (!clusters.has(p)) { clusters.set(p, {x: 0, y: 0, count: 0}); }
                    const c = clusters.get(p);
                    c.x += n.x;
                    c.y += n.y;
                    c.count++;
                });
                clusters.forEach(c => {
                    c.x /= c.count;
                    c.y /= c.count;
                });
                const k = clusterStrength * alpha;
                _nodes.forEach(n => {
                    const p = n.project || "__none__";
                    const c = clusters.get(p);
                    n.vx += (c.x - n.x) * k;
                    n.vy += (c.y - n.y) * k;
                });
            }
            force.initialize = function(nodes) { _nodes = nodes; };
            return force;
        }


        // Helper: scale precomputed 0-1000 coords to a large virtual canvas
        // Reads from layouts.forceatlas2 to avoid mutation bugs on re-entry
        function initPrecomputedCoords(ns) {
            const CANVAS = 3000;
            const scale = CANVAS / 1000;
            ns.forEach(n => {
                const fa2 = (n.layouts || {}).forceatlas2;
                if (fa2) {
                    n.x = fa2.x * scale;
                    n.y = fa2.y * scale;
                    n._hasLayout = true;
                } else if (n._origX != null) {
                    n.x = n._origX * scale;
                    n.y = n._origY * scale;
                    n._hasLayout = true;
                } else {
                    n.x = -9999; n.y = -9999;
                    n._hasLayout = false;
                }
            });
        }

        // Reset visibility when switching layouts (precomputed may have hidden nodes)
        nodeEls.attr("display", null);

        if (currentLayout === "force") {
            buildNodeShapes(currentLayout);
            const chargeMult = fc.chargeMult != null ? fc.chargeMult : 1.0;
            const linkDistMult = fc.linkDistMult != null ? fc.linkDistMult : 0.75;
            simulation = d3.forceSimulation(nodes)
                .alphaDecay(fc.alphaDecay != null ? fc.alphaDecay : 0.04)
                .velocityDecay(fc.velocityDecay != null ? fc.velocityDecay : 0.55)
                .alphaMin(fc.alphaMin != null ? fc.alphaMin : 0.002)
                // Pull linked nodes together; per-link distance/strength set in EDGE_FORCE
                .force("link", d3.forceLink(links).id(d => d.id)
                    .distance(d => d.distance * linkDistMult)
                    .strength(d => d.strength))
                // Push all nodes apart; charge varies by type (TYPE_CHARGE)
                .force("charge", d3.forceManyBody()
                    .strength(d => d.charge * chargeMult)
                    .distanceMax(fc.chargeDistanceMax))
                // Anchor the whole graph to the viewport center
                .force("center", d3.forceCenter(W / 2, H / 2))
                // Prevent node overlap with padding
                .force("collision", d3.forceCollide()
                    .radius(d => Math.max(d.w, d.h) / 2 + fc.collisionPadding)
                    .strength(fc.collisionStrength)
                    .iterations(fc.collisionIterations))
                // Pull same-project nodes toward their shared centroid
                .force("cluster", forceCluster(fc.clusterStrength != null ? fc.clusterStrength : 0.4))
                // Push orphans (no links) toward the periphery
                .force("orphanPush", d3.forceRadial(
                        Math.min(W, H) * fc.orphanRadius, W / 2, H / 2
                    ).strength(d => d.linkCount === 0 ? fc.orphanStrength : 0));

            // Warm start: run synchronous ticks for a settled initial layout,
            // then hand off to live animation for the remainder.
            // This avoids the browser doing heavy work on the first few frames.
            simulation.stop();
            const warmup = fc.warmupTicks != null ? fc.warmupTicks : 80;
            for (let i = 0; i < warmup; i++) simulation.tick();
            ticked();  // render warm-start result immediately
            simulation.on("tick", ticked).restart();
        } else if (currentLayout === "precomputed") {
            // Use precomputed coordinates directly — no simulation forces.
            initPrecomputedCoords(nodes);
            buildNodeShapes(currentLayout);
            nodeEls.attr("display", d => d._hasLayout ? null : "none");

            // Post-layout collision pass: resolve node overlaps without disturbing
            // the FA2 positions. Run synchronously (stop immediately, tick N times).
            const collSim = d3.forceSimulation(nodes.filter(n => n._hasLayout))
                .force("collision", d3.forceCollide()
                    .radius(d => Math.max(d.w, d.h) / 2 + fc.collisionPadding)
                    .strength(fc.collisionStrength)
                    .iterations(fc.collisionIterations))
                .stop();
            for (let i = 0; i < 40; i++) collSim.tick();

            ticked();

            simulation = null;

            autoZoomToFit(nodes.filter(n => n._hasLayout), 0);
        } else if (currentLayout === "atlas") {
            // ForceAtlas2-style: degree-scaled gravity + repulsion, no center force
            buildNodeShapes(currentLayout);
            simulation = d3.forceSimulation(nodes)
                // Stronger links to tighten clusters
                .force("link", d3.forceLink(links).id(d => d.id)
                    .distance(d => d.distance || 80)
                    .strength(d => (d.strength || 0.3) * 1.5))
                // Degree-scaled repulsion: hubs push harder
                .force("charge", d3.forceManyBody()
                    .strength(d => -30 * (1 + (d.linkCount || 0)))
                    .distanceMax(400))
                // Degree-scaled gravity replaces forceCenter —
                // high-degree nodes anchor near center, leaves drift out
                .force("gravity", d3.forceRadial(0, W / 2, H / 2)
                    .strength(d => 0.01 + 0.005 * (d.linkCount || 0)))
                // Prevent node overlap
                .force("collision", d3.forceCollide()
                    .radius(d => Math.max(d.w, d.h) / 2 + fc.collisionPadding)
                    .strength(fc.collisionStrength)
                    .iterations(fc.collisionIterations))
                // Project clustering
                .force("cluster", forceCluster(fc.clusterStrength))
                .on("tick", ticked);
        } else {
            // Generic precomputed layout from graph.json layouts map
            const CANVAS = 3000;
            const scale = CANVAS / 1000;
            nodes.forEach(n => {
                const lp = (n.layouts || {})[currentLayout];
                if (lp) {
                    n.x = lp.x * scale;
                    n.y = lp.y * scale;
                    if (lp.w != null) { n._lw = lp.w * scale; n._lh = lp.h * scale; }
                    if (lp.r != null) { n._lr = lp.r * scale; }
                    n._hasLayout = true;
                } else {
                    n.x = -9999; n.y = -9999;
                    n._hasLayout = false;
                }
            });

            // Arc diagram: normalise x positions and assign y by depth band.
            // Nodes are ordered horizontally by the graph-generated x position,
            // and vertically stratified by depth (goals at top, leaf tasks at bottom).
            // Arcs curve upward above the bands.
            if (currentLayout.startsWith("arc")) {
                const arcNodes = nodes.filter(n => n._hasLayout);
                // Normalise x across the canvas width with margins
                const xs = arcNodes.map(n => n.x);
                const minX = Math.min(...xs), maxX = Math.max(...xs);
                const xRange = maxX - minX || 1;
                const margin = CANVAS * 0.05;
                const availW = CANVAS - margin * 2;
                // Depth bands: spread vertically so hierarchy is readable
                const maxDepth = Math.max(...arcNodes.map(n => n.depth || 0), 1);
                const bandH = CANVAS * 0.55 / maxDepth;
                arcNodes.forEach(n => {
                    n.x = margin + ((n.x - minX) / xRange) * availW;
                    n.y = (n.depth || 0) * bandH;  // top = depth 0 (goals/projects)
                });
            }

            buildNodeShapes(currentLayout);

            // Z-order: bigger nodes behind (first in DOM), smaller on top for clickability
            if (currentLayout.startsWith("tree")) {
                nodeEls.sort((a, b) => ((b._lw || 0) * (b._lh || 0)) - ((a._lw || 0) * (a._lh || 0)));
            } else if (currentLayout.startsWith("circle")) {
                nodeEls.sort((a, b) => (b._lr || 0) - (a._lr || 0));
            }

            // Hide nodes without layout data for this mode
            nodeEls.attr("display", d => d._hasLayout ? null : "none");

            // Post-layout collision pass for FA2 and other precomputed layouts.
            // Skip for arc diagrams — collision would push nodes off the baseline.
            const hasCoords = nodes.filter(n => n._hasLayout);
            if (hasCoords.length > 0 && !currentLayout.startsWith("arc")) {
                const collSim2 = d3.forceSimulation(hasCoords)
                    .force("collision", d3.forceCollide()
                        .radius(d => Math.max(d.w, d.h) / 2 + fc.collisionPadding)
                        .strength(fc.collisionStrength)
                        .iterations(fc.collisionIterations))
                    .stop();
                for (let i = 0; i < 40; i++) collSim2.tick();
            }

            ticked();

            simulation = null;

            autoZoomToFit(nodes.filter(n => n._hasLayout), 0);

        }
    }

    function selectNode(e, d) {
        e.stopPropagation();
        activeNodeId = d.id;

        document.getElementById("dt").textContent = d.label;
        const bs = sbc[d.status]||"background:#f1f5f9;color:#475569";
        let h = `<div class="f"><span class="fl">Status</span> <span class="sb" style="${bs}">${d.status}</span></div>`;
        const fs = [
          d.badge?["Type",d.badge]:null, ["Priority","P"+d.priority],
          d.project?["Project",d.project]:null,
          d.dw>0?["Impact","\u2696 "+d.dw.toFixed(1)]:null,
          d.stakeholder?["Stakeholder","Yes"]:null,
          d.assignee?["Assignee",d.assignee]:null, ["ID",d.id],
        ].filter(Boolean);
        h += fs.map(([l,v])=>`<div class="f"><span class="fl">${l}</span><span class="fv">${v}</span></div>`).join("");
        document.getElementById("df").innerHTML = h;
        document.getElementById("detail").style.display = "block";

        const cBtn = document.getElementById("btn-complete");
        cBtn.style.display = ["done", "completed", "cancelled"].includes(d.status) ? "none" : "flex";

        // Show blocking chain count in detail panel
        const {upstream, downstream} = getChainEdges(d.id);
        if (upstream.size > 0 || downstream.size > 0) {
            const chainDiv = document.createElement("div");
            chainDiv.className = "f";
            chainDiv.innerHTML = `<span class="fl">Chain</span><span class="fv" style="color:#f97316">` +
                `${upstream.size > 0 ? "▲ blocked by " + upstream.size : ""}` +
                `${upstream.size > 0 && downstream.size > 0 ? " · " : ""}` +
                `${downstream.size > 0 ? "▼ enables " + downstream.size : ""}` +
                `</span>`;
            document.getElementById("df").appendChild(chainDiv);
        }
        updateCriticalPath(d.id);
        updateVisibility();
    }

    function updateVisibility() {
        // --- Focus mode: show only ego network (2-hop neighborhood), hide the rest ---
        if (focusNodeId && focusNeighborSet) {
            nodeEls
                .attr("display", d => focusNeighborSet.has(d.id) ? null : "none")
                .transition().duration(200)
                .attr("opacity", d => {
                    if (!focusNeighborSet.has(d.id)) return 0;
                    return d.id === focusNodeId ? 1.0 : 0.85;
                });
            linkEls.transition().duration(200).attr("opacity", l => {
                if (currentLayout.startsWith("tree") || currentLayout.startsWith("circle")) return 0;
                const sid = (typeof l.source === "object") ? l.source.id : l.source;
                const tid = (typeof l.target === "object") ? l.target.id : l.target;
                if (!focusNeighborSet.has(sid) || !focusNeighborSet.has(tid)) return 0;
                return l.type === "ref" ? 0.4 : 0.75;
            });
            return;
        }

        // --- Normal mode ---
        nodeEls.attr("display", null);
        nodeEls.transition().duration(200).attr("opacity", d => {
            if (currentFocusProject !== "ALL" && d.project !== currentFocusProject) return 0.05;
            if (activeNodeId && d.id !== activeNodeId) {
                // Dim non-neighbors to 15% (still visible for context)
                const isNeighbor = graphData.links.some(l => {
                    const sid = (typeof l.source === "object") ? l.source.id : l.source;
                    const tid = (typeof l.target === "object") ? l.target.id : l.target;
                    return (sid === activeNodeId && tid === d.id) || (tid === activeNodeId && sid === d.id);
                });
                if (!isNeighbor) return 0.12;
            }
            return d.opacity != null ? d.opacity : 1.0;
        });

        linkEls.transition().duration(200).attr("opacity", l => {
            if (currentLayout.startsWith("tree") || currentLayout.startsWith("circle")) return 0;
            const baseRef = currentLayout.startsWith("arc") ? 0.15 : 0.4;
            const baseOther = currentLayout.startsWith("arc") ? 0.4 : 0.7;
            if (currentFocusProject !== "ALL") {
                const sp = (typeof l.source === "object" ? l.source.project : null) || "none";
                const tp = (typeof l.target === "object" ? l.target.project : null) || "none";
                if (sp !== currentFocusProject && tp !== currentFocusProject) return 0.01;
            }
            if (activeNodeId) {
                const sid = (typeof l.source === "object") ? l.source.id : l.source;
                const tid = (typeof l.target === "object") ? l.target.id : l.target;
                if (sid !== activeNodeId && tid !== activeNodeId) return 0.05;
            }
            return l.type === "ref" ? baseRef : baseOther;
        });
    }

    Streamlit.setComponentReady();
  </script>
</body>
