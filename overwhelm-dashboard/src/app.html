<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
		<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
		<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
		<script id="tailwind-config">
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						colors: {
							"primary": "#00F0FF",
							"void": "#050505",
							"surface": "rgba(20, 25, 30, 0.6)",
							"text-main": "#E0E6ED",
							"text-muted": "#586575",
							"accent": "#FF2A6D",
						},
						fontFamily: {
							"display": ["Rajdhani", "sans-serif"],
							"body": ["Space Grotesk", "sans-serif"],
							"mono": ["JetBrains Mono", "monospace"],
						}
					}
				}
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-void text-text-main font-body antialiased selection:bg-primary/30 min-h-screen">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
