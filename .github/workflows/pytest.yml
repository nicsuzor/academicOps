name: Pytest

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, assigned]

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    concurrency:
      group: pytest-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Setup Test Environment
        run: |
          mkdir -p ~/.claude
          # Link the skills directory to ~/.claude/skills as expected by framework
          ln -s $GITHUB_WORKSPACE/aops-core/skills ~/.claude/skills
          ls -l ~/.claude/skills

      - name: Run pytest
        env:
          AOPS: ${{ github.workspace }}
          HANDOVER_GATE_MODE: warn
          QA_GATE_MODE: block
          CUSTODIET_GATE_MODE: block
          HYDRATION_GATE_MODE: warn
        run: uv run pytest -m "not requires_local_env"
