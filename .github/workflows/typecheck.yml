# Type Check: basedpyright. Read-only, no autofix.
# Runs independently — does not depend on Lint.
#
# See specs/pr-pipeline-v2.md for the full process documentation.

name: Type Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, assigned]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    concurrency:
      group: typecheck-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run basedpyright
        run: uv run basedpyright
