# Agent: Review
# Personality: Thoughtful reviewer. Provides structured critique.
# Responsibilities:
#   - Evaluate PR through axiom compliance + strategic alignment lens
#   - Apply prioritised critique protocol (primary concern + resolution, secondary concerns)
#   - Post PR comment with structured review
#   - Set "Agent Review" commit status (success/failure) — NOT gh pr review
# Prompt: .github/agents/conceptual-review.agent.md
#
# See specs/pr-pipeline-v2.md for the full process documentation.

name: "Agent: Review"

on:
  # pull_request trigger disabled — review-and-fix agent handles this now
  # pull_request:
  #   types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to review'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true

jobs:
  review:
    name: Agent Review
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: agent-review-${{ inputs.pr_number || github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      statuses: write
      id-token: write
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Read agent instructions
        id: prompt
        run: |
          PROMPT=$(cat .github/agents/conceptual-review.agent.md)
          {
            echo "prompt<<AGENT_EOF"
            echo "$PROMPT"
            echo "AGENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Determine PR info
        id: pr-info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            PR_DATA=$(gh pr view "${{ inputs.pr_number }}" --json number,headRefOid)
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "sha=$(echo "$PR_DATA" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Agent Review
        id: review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          allowed_bots: "claude[bot]"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ steps.prompt.outputs.prompt }}

            ---

            Review PR #${{ steps.pr-info.outputs.pr_number }} in repository ${{ github.repository }}.
            Use `gh pr view ${{ steps.pr-info.outputs.pr_number }}` and `gh pr diff ${{ steps.pr-info.outputs.pr_number }}` to gather information.

            Post a PR comment (`gh pr comment`) with your structured review following the output format in your instructions.

            Then set a commit status to reflect your verdict (do NOT use `gh pr review`):
            - No concerns → `gh api repos/${{ github.repository }}/statuses/${{ steps.pr-info.outputs.sha }} -f state="success" -f context="Agent Review" -f description="No concerns raised"`
            - Concerns found → `gh api repos/${{ github.repository }}/statuses/${{ steps.pr-info.outputs.sha }} -f state="failure" -f context="Agent Review" -f description="Concerns raised — see PR comment"`

          claude_args: '--model claude-opus-4-6 --allowed-tools "Bash(gh:*),Read"'
