# Agent: Assessor (Curia)
# Personality: Strategic reviewer who fixes what it can and flags what it can't.
# Responsibilities:
#   - Review PR diff for strategic alignment and assumption hygiene
#   - Push fixes for mechanical issues directly to the PR branch
#   - Comment briefly on issues requiring human judgment
#   - File gh pr review (APPROVE or REQUEST_CHANGES)
# Prompt: .github/agents/assessor.agent.md
# Curia: Assessor (GitHub surface). Local: .agent/skills/critic/SKILL.md
#
# See specs/pr-pipeline-v2.md for the full process documentation.

name: "Agent: Auto Review & Fix"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review and fix'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to review and fix'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout'
        type: string
        required: true

jobs:
  review-and-fix:
    name: Review & Fix
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: agent-review-fix-${{ inputs.pr_number || github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      id-token: write
      issues: write
      actions: read
    steps:
      - name: Determine PR info
        id: pr-info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          else
            PR_DATA=$(gh pr view "${{ inputs.pr_number }}" --json number,headRefOid,headRefName)
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "sha=$(echo "$PR_DATA" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
            echo "ref=$(echo "$PR_DATA" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.AOPS_BOT_GH_TOKEN }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-info.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # Self-loop detection
      - name: Check if last push was from merge-prep
        id: loop-check
        run: |
          LAST_MSG=$(git log -1 --format='%B')
          if echo "$LAST_MSG" | grep -q 'Merge-Prep-By:'; then
            echo "Last commit was from merge-prep — skipping to avoid loop"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: uv sync --frozen

      - name: Read agent instructions
        id: prompt
        run: |
          PROMPT=$(cat .github/agents/autofix.agent.md)
          {
            echo "prompt<<AGENT_EOF"
            echo "$PROMPT"
            echo "AGENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Review & Fix
        id: review
        if: steps.loop-check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.AOPS_BOT_GH_TOKEN }}
        with:
          allowed_bots: "claude[bot]"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ steps.prompt.outputs.prompt }}
          claude_args: '--model claude-opus-4-6 --allowed-tools "Bash,Edit,Read,Write"'
